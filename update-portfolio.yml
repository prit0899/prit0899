name: Update Portfolio Projects

on:
  schedule:
    - cron: "0 6 * * *"   # daily at 06:00 UTC — adjust as you like
  workflow_dispatch: {}     # lets you trigger it manually from the Actions tab
  repository_dispatch:
    types: [project_updated]  # triggered instantly by other repos (see notify-portfolio.yml)

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout portfolio repo
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v5
        with:
          node-version: "24"

      - name: Fetch repo data and update README
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_USERNAME: your-github-username
        run: node scripts/update-projects.mjs

      - name: Commit changes if anything updated
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "chore: auto-update projects table"
          file_pattern: README.md
