name: Update Portfolio Projects

on:
  push:
    branches:
      - main
  schedule:
    # Runs daily at 12:00 AM UTC
    - cron: '0 0 * * *'
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    
    permissions:
      contents: write
      
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        
      - name: Setup Deno
        uses: denoland/setup-deno@v2
        with:
          deno-version: v2.x
          
      - name: Fetch repo data and update README
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: deno run --allow-net --allow-read --allow-write --allow-env ./update-portfolio.ts
          
      - name: Commit and push changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          
          if [ -n "$(git status --porcelain)" ]; then
            git add README.md
            git commit -m "chore: update portfolio projects"
            git push
          else
            echo "No changes to commit"
          fi
